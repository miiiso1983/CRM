##############################################################
# Al Team CRM - Nginx Configuration for Cloudways
# Copy this content into:
# Cloudways Panel → Application → Settings → Vhost
##############################################################

server {
    listen 80;
    listen 443 ssl;

    # Replace with your actual domain
    server_name phpstack-1492540-6293582.cloudwaysapps.com;

    # Root: where frontend/dist files are uploaded
    root /home/master/applications/YOUR_APP_FOLDER/public_html;
    index index.html;

    # ─────────────────────────────────────────
    # Backend API: proxy /api/* → Node.js :5001
    # ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        # WebSocket support (Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ─────────────────────────────────────────
    # Socket.io path
    # ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ─────────────────────────────────────────
    # Frontend: React SPA (handle client-side routing)
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    access_log /var/log/nginx/crm_access.log;
    error_log  /var/log/nginx/crm_error.log;
}

